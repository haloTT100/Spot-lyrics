name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore --runtime win-x64

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publish
        run: dotnet publish "lyrics overlay.csproj" --no-restore --configuration Release --runtime win-x64 --self-contained false --output ./publish

      - name: Zip artifact
        run: Compress-Archive -Path ./publish/* -DestinationPath ./Spot-lyrics.zip

      - name: Create or update GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Automatically built from the latest commit on main."
          prerelease: false
          files: ./Spot-lyrics.zip
