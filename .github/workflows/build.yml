name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publish
        run: dotnet publish "lyrics overlay.csproj" --no-restore --configuration Release --runtime win-x64 --self-contained false --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spot-lyrics
          path: ./publish
